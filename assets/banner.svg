    <circle cx="188" cy="94" r="6" fill="#ff2b2b" fill-opacity="0.55"/>
    <circle cx="210" cy="94" r="6" fill="#fff1f1" fill-opacity="0.18"/>

    <text x="600" y="209" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="98" font-weight="800" letter-spacing="-6" fill="url(#text)" filter="url(#glow)">diaboliko</text>
    <rect x="828" y="138" width="7" height="76" rx="3.5" fill="#ff2b2b" opacity="0.92">
