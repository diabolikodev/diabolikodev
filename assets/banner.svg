<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="redGlow" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#ff2b2b" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#8d0d0d" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#050304" stop-opacity="0"/>
